# Nginx config for Hoc Hung Khoi API proxy
# This file should be placed in /etc/nginx/sites-available/ and linked to sites-enabled
# Or included in your main server block

server {
    listen 80;
    listen [::]:80;
    server_name hochungkhoi.site;

    # Backend API proxy
    location /api/ {
    proxy_pass http://127.0.0.1:3001/api/;
    proxy_http_version 1.1;
    
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Webhook specific - preserve raw body
    proxy_set_header Content-Type $content_type;
    proxy_buffering off;
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}

# Health check endpoint (explicit)
location /api/health {
    proxy_pass http://127.0.0.1:3001/api/health;
    proxy_http_version 1.1;
    
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # No caching for health check
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Frontend static files (optional - adjust path as needed)
    # location / {
    #     root /var/www/web1;
    #     index index.html;
    #     try_files $uri $uri/ /index.html;
    # }
}
